<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h2>Admin panel</h2>

<input id="kickName" placeholder="Felhasználó">
<button onclick="kick()">Kick</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function kick() {
  const name = document.getElementById("kickName").value;
  socket.emit("kickUser", name);
}
</script>

</body>
</html>
