<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>🔥 PRO CHAT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="auth">
  <h1>🔥 PRO CHAT</h1>
  <input id="username" placeholder="Felhasználó">
  <input id="password" type="password" placeholder="Jelszó">
  <button onclick="login()">Belépés</button>
  <button onclick="register()">Regisztráció</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">

  <!-- BAL OLDAL -->
  <div class="sidebar">
    <h3>👥 Userek</h3>
    <ul id="usersList"></ul>
  </div>

  <!-- JOBB OLDAL -->
  <div class="main">
    <div id="messages"></div>

    <div class="input">
      <input id="msgInput" placeholder="Írj üzenetet...">
      <button onclick="send()">Küldés</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
