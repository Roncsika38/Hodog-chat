<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hodog Ultra Chat</title>

<style>
body {
    background: black;
    color: lime;
    font-family: monospace;
}

#container {
    display: flex;
    width: 1000px;
    margin: 40px auto;
    border: 2px solid lime;
    box-shadow: 0 0 20px lime;
}

#chatBox {
    flex: 3;
    border-right: 2px solid lime;
    padding: 10px;
}

#messages {
    height: 350px;
    overflow-y: auto;
    border: 1px solid lime;
    padding: 5px;
    margin: 10px 0;
}

#usersBox {
    flex: 1;
    padding: 10px;
}

input, button {
    background: black;
    color: lime;
    border: 1px solid lime;
}

.admin {
    color: red;
    font-weight: bold;
}

.private {
    color: orange;
}

.time {
    color: gray;
    font-size: 10px;
}

#typing {
    color: yellow;
}
</style>
</head>

<body>

<div id="container">

<div id="chatBox">
    <h2>🔥 HODOG ULTRA 🔥</h2>

    <input id="username" placeholder="Név">
    <button onclick="join()">Belépés</button>

    <div id="messages"></div>
    <div id="typing"></div>

    <input id="msg" placeholder="Írj..." oninput="typing()">
    <button onclick="send()">Küld</button>
</div>

<div id="usersBox">
    <h3>Online</h3>
    <ul id="userList"></ul>
</div>

</div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let username = "";

function join() {
    username = document.getElementById("username").value;
    socket.emit("join", username);
}

function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("message", { username, msg });
    document.getElementById("msg").value = "";
}

function typing() {
    socket.emit("typing");
}

function addMessage(data) {
    const div = document.createElement("div");

    const time = document.createElement("span");
    time.classList.add("time");
    time.textContent = "[" + data.time + "] ";

    const name = document.createElement("span");
    name.textContent = data.username + ": ";

    if (data.username === "admin") {
        name.classList.add("admin");
    }

    const text = document.createElement("span");
    text.textContent = data.msg;

    div.appendChild(time);
    div.appendChild(name);
    div.appendChild(text);

    document.getElementById("messages").appendChild(div);

    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;

    document.getElementById("ping").play();
}

socket.on("message", addMessage);

socket.on("chatHistory", (msgs) => {
    msgs.forEach(addMessage);
});

socket.on("typing", (user) => {
    document.getElementById("typing").textContent = user + " ír...";
    setTimeout(() => {
        document.getElementById("typing").textContent = "";
    }, 1000);
});

socket.on("clearChat", () => {
    document.getElementById("messages").innerHTML = "";
});

socket.on("kicked", () => {
    alert("Kirúgtak!");
    location.reload();
});

socket.on("users", (users) => {
    const list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach(u => {
        const li = document.createElement("li");

        if (u === "admin") {
            li.innerHTML = "👑 " + u;
            li.style.color = "red";
        } else {
            li.textContent = u;
        }

        list.appendChild(li);
    });
});

</script>

</body>
</html>
