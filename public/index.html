<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bázis Chat Admin</title>

<style>
body {
    background: black;
    color: #00ff00;
    font-family: Courier New;
}

#container {
    display: flex;
    width: 800px;
    margin: auto;
}

#chat {
    flex: 3;
}

#messages {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #00ff00;
    margin: 10px 0;
}

#panel {
    flex: 1;
    border-left: 1px solid #00ff00;
    padding-left: 10px;
}

input, button {
    background: black;
    color: #00ff00;
    border: 1px solid #00ff00;
    margin: 2px;
}

.admin { color: red; }
</style>
</head>

<body>

<div id="container">

<div id="chat">
<b>Bázis Chat</b><br>

<input id="username">
<button onclick="join()">Belép</button>

<div id="messages"></div>

<input id="msg">
<button onclick="send()">Küld</button>
</div>

<div id="panel">
<b>Admin Panel</b><br>

<select id="userSelect"></select><br>

<button onclick="kick()">Kick</button>
<button onclick="ban()">Ban</button>
<button onclick="clearChat()">Clear</button>

<hr>

<b>Online:</b>
<ul id="users"></ul>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let username = "";

function join() {
    username = document.getElementById("username").value;
    socket.emit("join", username);
}

function send() {
    let msg = document.getElementById("msg").value;
    socket.emit("message", { username, msg });
    document.getElementById("msg").value = "";
}

function kick() {
    let u = document.getElementById("userSelect").value;
    socket.emit("message", { msg: "/kick " + u });
}

function ban() {
    let u = document.getElementById("userSelect").value;
    socket.emit("message", { msg: "/ban " + u });
}

function clearChat() {
    socket.emit("message", { msg: "/clear" });
}

function addMessage(data) {
    let div = document.createElement("div");

    let name = document.createElement("span");

    if (data.username === "roncsika38") {
        name.className = "admin";
    }

    name.textContent = "[" + data.time + "] " + data.username + ": ";

    let text = document.createElement("span");
    text.textContent = data.msg;

    div.appendChild(name);
    div.appendChild(text);

    document.getElementById("messages").appendChild(div);
}

socket.on("message", addMessage);

socket.on("chatHistory", msgs => msgs.forEach(addMessage));

socket.on("users", (users) => {
    let list = document.getElementById("users");
    let select = document.getElementById("userSelect");

    list.innerHTML = "";
    select.innerHTML = "";

    users.forEach(u => {
        let li = document.createElement("li");
        li.textContent = u;
        list.appendChild(li);

        let opt = document.createElement("option");
        opt.value = u;
        opt.textContent = u;
        select.appendChild(opt);
    });
});

socket.on("kicked", () => {
    alert("Kirúgtak!");
    location.reload();
});

socket.on("banned", () => {
    alert("Kitiltva!");
    location.reload();
});

socket.on("clearChat", () => {
    document.getElementById("messages").innerHTML = "";
});

</script>

</body>
</html>
