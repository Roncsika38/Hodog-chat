<!DOCTYPE html>
<html>
<head>
  <title>Chat szobák</title>
  <style>
    body { font-family: Arial; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
  </style>
</head>
<body>

<h2>Chat szobák</h2>

<input id="room" placeholder="Szoba neve" />
<button onclick="joinRoom()">Belépés / létrehozás</button>

<hr>

<div id="chat"></div>

<input id="msg" placeholder="Üzenet..." />
<button onclick="sendMsg()">Küldés</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentRoom = "";

function joinRoom() {
  const room = document.getElementById("room").value;
  currentRoom = room;
  socket.emit("joinRoom", room);
  document.getElementById("chat").innerHTML = "";
}

function sendMsg() {
  const text = document.getElementById("msg").value;
  socket.emit("message", { room: currentRoom, text });
}

socket.on("message", (data) => {
  const div = document.createElement("div");
  div.textContent = data.id + ": " + data.text;
  document.getElementById("chat").appendChild(div);
});
</script>

</body>
</html>
