<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>HODOG PRO CHAT</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(120deg, #4facfe, #00f2fe);
}

#app {
    display: flex;
    height: 100vh;
}

/* CHAT */
#chat {
    flex: 3;
    display: flex;
    flex-direction: column;
    background: white;
    padding: 10px;
}

#messages {
    flex: 1;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
}

.msg {
    margin-bottom: 8px;
}

.admin {
    color: red;
    font-weight: bold;
}

.time {
    font-size: 10px;
    color: gray;
}

/* OLDALSÁV */
#sidebar {
    flex: 1;
    background: #222;
    color: white;
    padding: 10px;
}

#sidebar h3 {
    color: #00f2fe;
}

/* INPUT */
#inputBox {
    display: flex;
    margin-top: 10px;
}

#inputBox input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    background: #00f2fe;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="app">

    <div id="chat">
        <h2>🔥 HODOG PRO CHAT 🔥</h2>

        <input id="username" placeholder="Neved...">
        <button onclick="join()">Belépés</button>

        <div id="messages"></div>

        <div id="inputBox">
            <input id="msg" placeholder="Írj..." onkeypress="handleKey(event)">
            <button onclick="send()">Küld</button>
        </div>
    </div>

    <div id="sidebar">
        <h3>Online</h3>
        <ul id="userList"></ul>

        <hr>

        <h3>Admin panel</h3>
        <button onclick="clearChat()">Chat törlés</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let username = "";

/* BELÉPÉS */
function join() {
    username = document.getElementById("username").value;
    socket.emit("join", username);
}

/* ENTER KÜLDÉS */
function handleKey(e) {
    if (e.key === "Enter") send();
}

/* ÜZENET KÜLDÉS */
function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("message", { msg });
    document.getElementById("msg").value = "";
}

/* ADMIN CLEAR */
function clearChat() {
    socket.emit("clear");
}

/* ÜZENET MEGJELENÍTÉS */
socket.on("message", (data) => {
    let div = document.createElement("div");
    div.classList.add("msg");

    if (data.role === "admin") div.classList.add("admin");

    div.innerHTML = `
        <span class="time">[${data.time}]</span>
        <b>${data.username}</b>: ${data.msg}
    `;

    document.getElementById("messages").appendChild(div);

    let box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
});

/* USER LIST */
socket.on("users", (users) => {
    let list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach(u => {
        let li = document.createElement("li");
        li.textContent = u.name + (u.role === "admin" ? " 👑" : "");
        list.appendChild(li);
    });
});

/* CHAT CLEAR */
socket.on("clear", () => {
    document.getElementById("messages").innerHTML = "";
});
</script>

</body>
</html>
