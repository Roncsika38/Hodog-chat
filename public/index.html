<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hodog Chat</title>

<style>
body {
    display: flex;
    justify-content: center;
    background: black;
    color: lime;
    font-family: monospace;
}

#chat {
    width: 600px;
    border: 2px solid lime;
    padding: 10px;
}

#messages {
    height: 300px;
    overflow-y: scroll;
    border: 1px solid lime;
    margin: 10px 0;
    padding: 5px;
}

#sidebar {
    width: 200px;
    margin-left: 20px;
    border: 2px solid lime;
    padding: 10px;
}
</style>

</head>
<body>

<div id="chat">
    <h2>🔥 HODOG CHAT 🔥</h2>

    <input id="username" placeholder="Név">
    <button onclick="join()">Belépés</button>

    <div id="messages"></div>

    <input id="msg" placeholder="Írj valamit...">
    <button onclick="send()">Küld</button>
</div>

<div id="sidebar">
    <h3>👥 Online</h3>
    <ul id="userList"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let username = "";

function join() {
    username = document.getElementById("username").value;
    socket.emit("join", username);
}

function send() {
    const msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("message", { username, msg });
    document.getElementById("msg").value = "";
}

socket.on("message", (data) => {
    const div = document.createElement("div");

    div.innerHTML = "<b>" + data.username + ":</b> " + data.msg;

    document.getElementById("messages").appendChild(div);

    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
});

socket.on("users", (users) => {
    const list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach((u) => {
        const li = document.createElement("li");

        if (u.admin) {
            li.innerHTML = "👑 " + u.name;
            li.style.color = "red";
        } else {
            li.textContent = u.name;
        }

        list.appendChild(li);
    });
});
</script>

</body>
</html>
