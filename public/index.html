<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Hodog Pro</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

.center { display:flex; justify-content:center; align-items:center; height:100vh; }

.box { background:#1e293b; padding:30px; border-radius:10px; width:300px; }

input { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; }

button { width:100%; padding:10px; margin-top:10px; background:#22c55e; border:none; color:white; border-radius:5px; cursor:pointer; }

#chat { display:none; height:100vh; }

#app { display:flex; height:100%; }

#sidebar { width:220px; background:#020617; padding:20px; }

#main { flex:1; display:flex; flex-direction:column; }

#messages { flex:1; padding:20px; overflow-y:auto; }

.msg { margin-bottom:10px; }

.admin { color:#f43f5e; }

.delete { color:red; cursor:pointer; margin-left:10px; }

#inputBox { display:flex; padding:10px; background:#1e293b; }

#inputBox input { flex:1; }

#inputBox button { width:100px; margin-left:10px; }

.user { margin-bottom:5px; }
</style>
</head>

<body>

<div id="auth" class="center">
  <div class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Felhasználó">
    <input id="pass" type="password" placeholder="Jelszó">
    <button onclick="login()">Belépés</button>
    <button onclick="register()">Regisztráció</button>
  </div>
</div>

<div id="chat">
  <div id="app">
    <div id="sidebar">
      <h3>🟢 Online</h3>
      <div id="users"></div>
    </div>

    <div id="main">
      <div id="messages"></div>

      <div id="inputBox">
        <input id="msgInput" placeholder="Írj...">
        <button onclick="send()">Küld</button>
      </div>
    </div>
  </div>
</div>

<script>
let socket;
let userData;

async function register() {
  await fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username:user.value, password:pass.value })
  });
  alert("Kész");
}

async function login() {
  const res = await fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username:user.value, password:pass.value })
  });

  const data = await res.json();
  if (!data.success) return alert("Hiba");

  userData = data.user;
  start();
}

function start() {
  auth.style.display="none";
  chat.style.display="block";

  socket = io();
  socket.emit("join", userData);

  socket.on("loadMessages", msgs => msgs.forEach(addMsg));

  socket.on("message", addMsg);

  socket.on("online", list => {
    users.innerHTML="";
    list.forEach(u=>{
      users.innerHTML += `<div class="user">${u.username}</div>`;
    });
  });

  socket.on("deleteMsg", id=>{
    document.getElementById(id)?.remove();
  });
}

function send() {
  socket.emit("message", msgInput.value);
  msgInput.value="";
}

function addMsg(m) {
  const div = document.createElement("div");
  div.className="msg";
  div.id = m._id;

  let del = "";
  if (userData.role === "admin") {
    del = `<span class="delete" onclick="delMsg('${m._id}')">❌</span>`;
  }

  if (m.username === "roncsika38") {
    div.innerHTML = `<b class="admin">[ADMIN] ${m.username}</b>: ${m.msg} ${del}`;
  } else {
    div.innerHTML = `<b>${m.username}</b>: ${m.msg} ${del}`;
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function delMsg(id) {
  socket.emit("deleteMsg", id);
}
</script>

</body>
</html>
