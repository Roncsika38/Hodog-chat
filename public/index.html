<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Hodog Chat</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    #chat {
      display: none;
      height: 100vh;
      display: flex;
    }

    #sidebar {
      width: 200px;
      background: #020617;
      padding: 20px;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin-bottom: 10px;
    }

    .admin {
      color: #f43f5e;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    #inputBox input {
      flex: 1;
      margin: 0;
    }

    #inputBox button {
      width: 100px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div id="auth" class="center">
  <div class="box">
    <h2>Bejelentkezés</h2>
    <input id="user" placeholder="Felhasználónév">
    <input id="pass" type="password" placeholder="Jelszó">
    <button onclick="login()">Belépés</button>
    <button onclick="register()">Regisztráció</button>
  </div>
</div>

<div id="chat">
  <div id="sidebar">
    <h3>Online</h3>
    <div id="users"></div>
  </div>

  <div id="main">
    <div id="messages"></div>

    <div id="inputBox">
      <input id="msgInput" placeholder="Írj üzenetet...">
      <button onclick="send()">Küld</button>
    </div>
  </div>
</div>

<script>
let socket;
let username = "";
let role = "";

async function register() {
  const u = user.value;
  const p = pass.value;

  await fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username: u, password: p })
  });

  alert("Regisztrálva!");
}

async function login() {
  const u = user.value;
  const p = pass.value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username: u, password: p })
  });

  const data = await res.json();

  if (!data.success) return alert("Hibás adatok");

  username = data.user.username;
  role = data.user.role;

  startChat();
}

function startChat() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("chat").style.display = "flex";

  socket = io();

  socket.emit("join", username);

  socket.on("loadMessages", msgs => {
    msgs.forEach(addMsg);
  });

  socket.on("message", addMsg);
}

function send() {
  const msg = msgInput.value;
  socket.emit("message", msg);
  msgInput.value = "";
}

function addMsg(m) {
  const div = document.createElement("div");
  div.className = "msg";

  if (m.username === "roncsika38") {
    div.innerHTML = `<b class="admin">[ADMIN] ${m.username}</b>: ${m.msg}`;
  } else {
    div.innerHTML = `<b>${m.username}</b>: ${m.msg}`;
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
