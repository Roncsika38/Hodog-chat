<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Hodog Chat PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CHAT KERET */
#chat {
    width: 900px;
    height: 600px;
    display: flex;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 30px black;
}

/* BAL OLDAL */
#left {
    flex: 3;
    background: rgba(0,0,0,0.8);
    color: white;
    display: flex;
    flex-direction: column;
}

/* JOBB OLDAL */
#right {
    flex: 1;
    background: rgba(255,255,255,0.1);
    color: white;
    padding: 10px;
    border-left: 2px solid #00ffcc;
}

/* HEADER */
#header {
    padding: 10px;
    font-size: 20px;
    text-align: center;
    background: black;
    color: gold;
    font-weight: bold;
    text-shadow: 0 0 10px orange;
}

/* MESSAGES */
#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin: 5px 0;
}

.admin {
    color: red;
    font-weight: bold;
}

.time {
    color: gray;
    font-size: 12px;
}

/* INPUT */
#inputBox {
    display: flex;
    padding: 10px;
    background: black;
}

input {
    padding: 5px;
    border: none;
    margin-right: 5px;
}

button {
    background: #00ffcc;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

/* USER LIST */
#userList li {
    color: #00ffcc;
}

/* LOGIN */
#login {
    padding: 10px;
    background: black;
}
</style>
</head>

<body>

<div id="chat">

<div id="left">

<div id="header">🔥 HODOG CHAT PRO 🔥</div>

<div id="login">
<input id="username" placeholder="Név">
<button onclick="join()">Belépés</button>
</div>

<div id="messages"></div>

<div id="inputBox">
<input id="msg" placeholder="Írj...">
<button onclick="send()">Küld</button>
</div>

</div>

<div id="right">
<h3>Online</h3>
<ul id="userList"></ul>

<hr>

<h3>Profil</h3>
<div id="me">Nincs</div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = "";

/* BELÉPÉS */
function join() {
    username = document.getElementById("username").value;
    if (!username) return;

    socket.emit("join", username);

    document.getElementById("me").innerHTML =
        username === "admin"
        ? "👑 ADMIN: " + username
        : "👤 " + username;
}

/* ÜZENET */
function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("message", {
        username,
        msg
    });

    document.getElementById("msg").value = "";
}

/* ÜZENET MEGJELENÍTÉS */
socket.on("message", (data) => {
    const div = document.createElement("div");
    div.className = "msg";

    let time = new Date().toLocaleTimeString();

    div.innerHTML =
        `<span class="time">[${time}]</span> ` +
        `<span class="${data.username === 'admin' ? 'admin' : ''}">
        ${data.username}:
        </span> ${data.msg}`;

    document.getElementById("messages").appendChild(div);
});

/* USER LIST */
socket.on("users", (users) => {
    const list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach(u => {
        const li = document.createElement("li");
        li.textContent = u === "admin" ? "👑 " + u : u;
        list.appendChild(li);
    });
});
</script>

</body>
</html>
