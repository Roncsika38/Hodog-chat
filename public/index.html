<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Hodog Chat PRO</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Socket -->
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>

<!-- ===== LOGIN ===== -->
<div id="login" style="display:flex; justify-content:center; align-items:center; height:100vh;">
  <div style="background:#1e293b; padding:30px; border-radius:10px;">
    <h2 style="color:white;">Belépés</h2>
    
    <input id="name" placeholder="Neved" style="padding:10px; width:200px;"><br><br>
    
    <button onclick="join()" style="padding:10px; width:100%;">Belépés</button>
  </div>
</div>

<!-- ===== CHAT ===== -->
<div id="chat" style="display:none; height:100vh;">

  <div style="display:flex; height:100%;">

    <!-- SIDEBAR -->
    <div style="width:200px; background:#020617; color:white; padding:10px;">
      <h3>Users</h3>
      <div id="users"></div>
    </div>

    <!-- MAIN -->
    <div style="flex:1; display:flex; flex-direction:column;">

      <!-- MESSAGES -->
      <div id="messages" style="flex:1; padding:10px; overflow-y:auto;"></div>

      <!-- INPUT -->
      <div style="display:flex;">
        <input id="msg" placeholder="Írj..." style="flex:1; padding:10px;">
        <button onclick="send()" style="padding:10px;">Küld</button>
      </div>

    </div>

  </div>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
