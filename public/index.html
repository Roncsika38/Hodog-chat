<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Chat</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: "Courier New", monospace;
}

#messages {
  border: 1px solid #00ff00;
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  margin-bottom: 10px;
}

input, button {
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  font-family: inherit;
}

button:hover {
  background: #003300;
  cursor: pointer;
}

.admin {
  color: red;
}
</style>
</head>

<body>

<h2>RETRO CHAT</h2>

<input id="username" placeholder="Név">
<input id="password" placeholder="Admin jelszó">
<button onclick="join()">Belépés</button>

<div id="messages"></div>

<input id="messageInput" placeholder="Üzenet">
<button onclick="sendMessage()">Küldés</button>

<div id="adminPanel" style="display:none;">
  <h3>ADMIN PANEL</h3>
  <input id="kickId" placeholder="Socket ID">
  <button onclick="kickUser()">Kick</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const messages = document.getElementById("messages");
const input = document.getElementById("messageInput");

function join() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  socket.emit("join", { username, password });
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  socket.emit("message", text);
  input.value = "";
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

socket.on("message", (msg) => {
  const div = document.createElement("div");

  if (msg.user === "ADMIN") {
    div.classList.add("admin");
  }

  div.textContent = `[${msg.user}] > ${msg.text}`;
  messages.appendChild(div);

  messages.scrollTop = messages.scrollHeight;
});

socket.on("isAdmin", (isAdmin) => {
  if (isAdmin) {
    document.getElementById("adminPanel").style.display = "block";
  }
});

function kickUser() {
  const id = document.getElementById("kickId").value;
  socket.emit("kick", id);
}
</script>

</body>
</html>
