<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f5f7fb;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  padding: 12px;
  margin: 5px 0;
  width: 220px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 12px;
  border: none;
  background: #4CAF50;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* CHAT */
#chat {
  display: none;
  height: 100vh;
  display: flex;
}

.sidebar {
  width: 220px;
  background: white;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.sidebar h3 {
  margin-top: 0;
}

.user {
  padding: 8px;
  border-radius: 6px;
}

.user:hover {
  background: #eee;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.msg {
  margin-bottom: 10px;
}

.msg span {
  font-weight: bold;
}

.input-area {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
}

.input-area input {
  flex: 1;
}

</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h2>Belépés</h2>
    <input id="username" placeholder="Felhasználónév">
    <br>
    <button id="loginBtn">Belépés</button>
  </div>
</div>

<div id="chat">
  <div class="sidebar">
    <h3>Felhasználók</h3>
    <div id="users"></div>
  </div>

  <div class="main">
    <div id="messages"></div>

    <div class="input-area">
      <input id="msg" placeholder="Írj üzenetet...">
      <button id="sendBtn">Küld</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const login = document.getElementById("login");
const chat = document.getElementById("chat");

document.getElementById("loginBtn").onclick = () => {
  const name = document.getElementById("username").value.trim();
  if (!name) return alert("Adj meg nevet!");

  socket.emit("join", name);

  login.style.display = "none";
  chat.style.display = "flex";
};

document.getElementById("sendBtn").onclick = send;

document.getElementById("msg").addEventListener("keypress", (e) => {
  if (e.key === "Enter") send();
});

function send() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  socket.emit("chatMessage", msg);
  document.getElementById("msg").value = "";
}

socket.on("message", (data) => {
  const div = document.createElement("div");
  div.className = "msg";

  div.innerHTML = `<span>${data.user}:</span> ${data.text}`;

  document.getElementById("messages").appendChild(div);
});

socket.on("userList", (list) => {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  list.forEach(u => {
    const div = document.createElement("div");
    div.className = "user";
    div.textContent = u;

    div.onclick = () => {
      if (confirm("Kick? " + u)) {
        socket.emit("kickUser", u);
      }
    };

    usersDiv.appendChild(div);
  });
});
</script>

</body>
</html>
