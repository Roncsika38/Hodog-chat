<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <input id="name" placeholder="Neved">
  <button onclick="join()">Belépés</button>
</div>

<div id="chat" style="display:none;">
  <div id="sidebar">
    <h3>Users</h3>
    <div id="users"></div>
  </div>

  <div id="main">
    <div id="messages"></div>

    <div id="input">
      <input id="msg">
      <button onclick="send()">Küld</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
