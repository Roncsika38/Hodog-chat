<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Hodog Chat PRO+</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

#container {
    display: flex;
    height: 100vh;
}

/* CHAT */
#chat {
    flex: 3;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 5px 0;
}

.time {
    font-size: 10px;
    color: #aaa;
}

/* JOBB PANEL */
#side {
    flex: 1;
    background: #111;
    padding: 10px;
}

/* INPUT */
#inputBox {
    display: flex;
    padding: 10px;
    background: #000;
}

input, button, select {
    margin: 3px;
    padding: 5px;
}

/* ADMIN */
.admin {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="container">

<div id="chat">

<h2>🔥 HODOG PRO+ 🔥</h2>

<div id="messages"></div>

<div id="inputBox">
<input id="msg" placeholder="Írj...">
<button onclick="send()">Küld</button>
</div>

</div>

<div id="side">

<h3>⚙️ Beállítás</h3>

Név:<br>
<input id="nameInput"><br>

Szín:<br>
<input type="color" id="colorInput"><br>

<button onclick="saveSettings()">Mentés</button>

<hr>

<h3>👥 Online</h3>
<ul id="users"></ul>

<div id="me"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let username = localStorage.getItem("name") || "";
let color = localStorage.getItem("color") || "#00ffcc";

/* BETÖLTÉS */
window.onload = () => {
    document.getElementById("nameInput").value = username;
    document.getElementById("colorInput").value = color;

    if (username) {
        socket.emit("join", username);
        updateMe();
    }
};

/* MENTÉS */
function saveSettings() {
    username = document.getElementById("nameInput").value;
    color = document.getElementById("colorInput").value;

    localStorage.setItem("name", username);
    localStorage.setItem("color", color);

    socket.emit("join", username);
    updateMe();
}

/* SAJÁT INFO */
function updateMe() {
    const me = document.getElementById("me");

    if (username === "roncsika38") {
        me.innerHTML = "👑 ADMIN: " + username;
        me.style.color = "red";
    } else {
        me.innerHTML = "👤 " + username;
        me.style.color = color;
    }
}

/* KÜLDÉS */
function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("message", {
        username,
        msg,
        color
    });

    document.getElementById("msg").value = "";
}

/* ÜZENET */
socket.on("message", (data) => {
    const div = document.createElement("div");
    div.className = "msg";

    let nameStyle = `color:${data.color || "#fff"}`;

    if (data.username === "roncsika38") {
        nameStyle = "color:red; font-weight:bold;";
    }

    div.innerHTML = `
        <span class="time">[${data.time}]</span>
        <span style="${nameStyle}">
            ${data.username}:
        </span>
        ${data.msg}
    `;

    document.getElementById("messages").appendChild(div);
});

/* USER LIST */
socket.on("users", (users) => {
    const list = document.getElementById("users");
    list.innerHTML = "";

    users.forEach(u => {
        let li = document.createElement("li");

        if (u === "roncsika38") {
            li.innerHTML = "👑 " + u;
            li.style.color = "red";
        } else {
            li.textContent = u;
        }

        list.appendChild(li);
    });
});

</script>

</body>
</html>
