<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🔥 Hodog Chat PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
  color: white;
}

#app {
  display: flex;
  height: 100vh;
}

#chatBox {
  flex: 3;
  display: flex;
  flex-direction: column;
  padding: 10px;
}

#messages {
  flex: 1;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  overflow-y: auto;
  border-radius: 10px;
}

#inputBar {
  display: flex;
  margin-top: 10px;
}

#msg {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px;
  margin-left: 5px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
}

#sidebar {
  flex: 1;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-left: 2px solid #00ffcc;
}

.admin {
  color: red;
  font-weight: bold;
}

.user {
  color: cyan;
}
</style>

</head>

<body>

<div id="app">

  <div id="chatBox">
    <h2>🔥 HODOG CHAT 🔥</h2>

```
<input id="username" placeholder="Neved">
<button onclick="join()">Belépés</button>

<div id="messages"></div>

<div id="inputBar">
  <input id="msg" placeholder="Írj valamit...">
  <button onclick="send()">Küld</button>
</div>
```

  </div>

  <div id="sidebar">
    <h3>Online</h3>
    <ul id="userList"></ul>

```
<hr>

<h3>⚙️ Admin</h3>
<button onclick="clearChat()">Chat törlés</button>
```

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let username = "";

function join() {
  username = document.getElementById("username").value;
  socket.emit("join", username);
}

function send() {
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  socket.emit("message", { msg });
  document.getElementById("msg").value = "";
}

// ENTER küldés
document.getElementById("msg").addEventListener("keypress", function(e) {
  if(e.key === "Enter") send();
});

// Üzenet megjelenítés
socket.on("message", (data) => {
  const div = document.createElement("div");

  div.innerHTML = `
    <span class="${data.role}">${data.username}</span>:
    ${data.msg}
  `;

  document.getElementById("messages").appendChild(div);
});

// User lista
socket.on("users", (users) => {
  const list = document.getElementById("userList");
  list.innerHTML = "";

  users.forEach(u => {
    const li = document.createElement("li");

    li.innerHTML = u.role === "admin"
      ? "👑 " + u.name
      : u.name;

    list.appendChild(li);
  });
});

// Admin funkció
function clearChat() {
  document.getElementById("messages").innerHTML = "";
}
</script>

</body>
</html>
