<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Hodog Pro Engine</title>

<style>
body {
    margin: 0;
    font-family: Consolas;
    background: #0d1117;
    color: #00ff9c;
}

#container {
    display: flex;
    height: 100vh;
}

/* CHAT */
#chat {
    flex: 3;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 14px;
}

.msg {
    margin: 4px 0;
}

.time {
    color: #555;
    font-size: 11px;
}

/* INPUT */
#inputBox {
    padding: 10px;
    border-top: 1px solid #222;
}

textarea {
    width: 100%;
    height: 60px;
    background: #0d1117;
    color: #00ff9c;
    border: 1px solid #222;
}

/* OLDALSÁV */
#side {
    flex: 1;
    background: #010409;
    border-left: 1px solid #222;
    padding: 10px;
}

/* USER */
.user {
    padding: 4px;
    cursor: pointer;
}
.user:hover {
    background: #111;
}

/* ADMIN */
.admin {
    color: #ff4d4d;
    font-weight: bold;
}

button {
    background: #111;
    color: #00ff9c;
    border: 1px solid #333;
    margin: 2px;
    padding: 5px;
}
</style>
</head>

<body>

<div id="container">

<div id="chat">

<h3>💻 HODOG ENGINE</h3>

<div id="messages"></div>

<div id="inputBox">
<textarea id="msg" placeholder="Írj..."></textarea>
</div>

</div>

<div id="side">

<h3>⚙️ Beállítás</h3>

<input id="nameInput" placeholder="Név"><br>
<input type="color" id="colorInput"><br>
<button onclick="save()">Mentés</button>

<hr>

<h3>👥 Online</h3>
<div id="users"></div>

<hr>

<div id="adminPanel" style="display:none">
<h3>👑 Admin</h3>

Kiválasztott: <span id="selected">-</span><br>

<button onclick="kick()">Kick</button>
<button onclick="ban()">Ban</button>
<button onclick="clearChat()">Clear</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let username = localStorage.getItem("name") || "";
let color = localStorage.getItem("color") || "#00ff9c";
let selected = "";

/* LOAD */
window.onload = ()=>{
    nameInput.value = username;
    colorInput.value = color;

    if(username){
        socket.emit("join", username);
        updateMe();
    }
};

/* ENTER */
msg.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

/* SAVE */
function save(){
    username = nameInput.value;
    color = colorInput.value;

    localStorage.setItem("name",username);
    localStorage.setItem("color",color);

    socket.emit("join", username);
    updateMe();
}

/* ADMIN CHECK */
function updateMe(){
    if(username==="roncsika38"){
        adminPanel.style.display="block";
    }
}

/* SEND */
function send(){
    let text = msg.value.trim();
    if(!text) return;

    socket.emit("message",{username,msg:text,color});
    msg.value="";
}

/* CHAT */
socket.on("message",(d)=>{
    let div=document.createElement("div");

    let style=`color:${d.color || "#fff"}`;

    if(d.username==="roncsika38"){
        style="color:#ff4d4d;font-weight:bold;";
    }

    div.innerHTML=`
    <span class="time">[${d.time}]</span>
    <span style="${style}">${d.username}:</span>
    ${d.msg.replace(/\n/g,"<br>")}`;

    messages.appendChild(div);
    messages.scrollTop=999999;
});

/* USERS */
socket.on("users",(u)=>{
    users.innerHTML="";

    u.forEach(name=>{
        let div=document.createElement("div");
        div.className="user";

        if(name==="roncsika38"){
            div.innerHTML="👑 "+name;
            div.style.color="#ff4d4d";
        } else {
            div.textContent=name;
        }

        div.onclick=()=>{
            selected=name;
            document.getElementById("selected").innerText=name;
        };

        users.appendChild(div);
    });
});

/* ADMIN */
function kick(){
    socket.emit("message",{msg:"/kick "+selected});
}
function ban(){
    socket.emit("message",{msg:"/ban "+selected});
}
function clearChat(){
    socket.emit("message",{msg:"/clear"});
}

</script>

</body>
</html>
