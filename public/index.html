<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRO CHAT</title>
<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<div id="auth">
  <h2>Login / Register</h2>
  <input id="user" placeholder="Felhasználó"><br>
  <input id="pass" type="password" placeholder="Jelszó"><br>

  <button onclick="login()">Belépés</button>
  <button onclick="register()">Regisztráció</button>
</div>

<div id="chat" style="display:none;">
  <div id="users"></div>
  <div id="messages"></div>

  <input id="msg">
  <button onclick="send()">Küld</button>
</div>

<script src="app.js"></script>
</body>
</html>
