<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hodog Pro Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
    color: white;
}

#container {
    display: flex;
    height: 100vh;
}

/* CHAT */
#chat {
    flex: 3;
    display: flex;
    flex-direction: column;
}

#header {
    padding: 15px;
    background: linear-gradient(90deg, #ff0080, #7928ca);
    font-size: 20px;
    font-weight: bold;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* ÜZENET */
.msg {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

.admin {
    color: #ff4d4d;
    font-weight: bold;
}

.time {
    font-size: 10px;
    color: #aaa;
}

/* INPUT */
#inputBox {
    display: flex;
    padding: 10px;
    background: #111;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
    margin-right: 5px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #ff0080;
    color: white;
    cursor: pointer;
}

/* USER LIST */
#users {
    flex: 1;
    background: #111;
    padding: 10px;
}

.user {
    padding: 5px;
    border-bottom: 1px solid #333;
}

.adminUser {
    color: #ff4d4d;
}
</style>
</head>

<body>

<div id="container">

<div id="chat">

<div id="header">🔥 Hodog Pro Chat</div>

<div>
<input id="username" placeholder="Név">
<button onclick="join()">Belépés</button>
</div>

<div id="messages"></div>

<div id="inputBox">
<input id="msg" placeholder="Írj valamit...">
<button onclick="send()">Küld</button>
</div>

</div>

<div id="users">
<b>Online</b>
<div id="userList"></div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let username = "";

function join() {
    username = document.getElementById("username").value;
    socket.emit("join", username);
}

function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("message", { username, msg });
    document.getElementById("msg").value = "";
}

function addMessage(data) {
    const div = document.createElement("div");
    div.className = "msg";

    let name = data.username;
    if (data.username === "roncsika38") {
        name = "👑 " + name;
    }

    div.innerHTML = `
        <span class="time">[${data.time}]</span>
        <b class="${data.username === 'roncsika38' ? 'admin' : ''}">
            ${name}
        </b>: ${data.msg}
    `;

    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 999999;
}

socket.on("message", addMessage);

socket.on("chatHistory", msgs => msgs.forEach(addMessage));

socket.on("users", users => {
    const list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach(u => {
        let div = document.createElement("div");
        div.className = "user";

        if (u === "roncsika38") {
            div.classList.add("adminUser");
            div.textContent = "👑 " + u;
        } else {
            div.textContent = "🟢 " + u;
        }

        list.appendChild(div);
    });
});

socket.on("kicked", () => {
    alert("Kirúgtak!");
    location.reload();
});

socket.on("banned", () => {
    alert("Kitiltva!");
    location.reload();
});

</script>

</body>
</html>
