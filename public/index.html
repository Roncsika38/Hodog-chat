<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Hodog Modern Chat</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f0f2f5;
}

#app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
#sidebar {
    width: 260px;
    background: #2f3136;
    color: white;
    padding: 15px;
}

#sidebar h2 {
    margin-top: 0;
}

/* CHAT */
#chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    background: white;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 10px;
}

.admin {
    border-left: 4px solid red;
}

#input {
    display: flex;
    padding: 10px;
    background: white;
}

#input input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-left: 5px;
    padding: 10px;
    border: none;
    background: #5865F2;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* LOGIN */
#login {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
}

#loginBox {
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="login">
    <div id="loginBox">
        <h2>Belépés / Regisztráció</h2>
        <input id="name" placeholder="Felhasználónév"><br><br>
        <button onclick="login()">Belépés</button>
    </div>
</div>

<div id="app">

    <div id="sidebar">
        <h2>💬 Hodog Chat</h2>
        <p id="me"></p>

        <h3>Online</h3>
        <ul id="users"></ul>

        <hr>

        <h3>Admin</h3>
        <button onclick="clearChat()">Chat törlés</button>
    </div>

    <div id="chat">
        <div id="messages"></div>

        <div id="input">
            <input id="msg" placeholder="Írj..." onkeypress="key(event)">
            <button onclick="send()">Küld</button>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let username = "";

/* LOGIN */
function login() {
    username = document.getElementById("name").value;
    if (!username) return;

    localStorage.setItem("user", username);

    document.getElementById("login").style.display = "none";
    document.getElementById("me").innerText = "Te: " + username;

    socket.emit("join", username);
}

/* AUTO LOGIN */
window.onload = () => {
    let saved = localStorage.getItem("user");
    if (saved) {
        document.getElementById("name").value = saved;
        login();
    }
};

/* ENTER */
function key(e) {
    if (e.key === "Enter") send();
}

/* SEND */
function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("message", { msg });
    document.getElementById("msg").value = "";
}

/* ADMIN */
function clearChat() {
    socket.emit("clear");
}

/* RECEIVE */
socket.on("message", (d) => {
    let div = document.createElement("div");
    div.className = "msg";

    if (d.role === "admin") div.classList.add("admin");

    div.innerHTML = `<b>${d.username}</b>: ${d.msg}`;
    document.getElementById("messages").appendChild(div);
});

/* USERS */
socket.on("users", (u) => {
    let ul = document.getElementById("users");
    ul.innerHTML = "";

    u.forEach(x => {
        let li = document.createElement("li");
        li.textContent = x.name + (x.role === "admin" ? " 👑" : "");
        ul.appendChild(li);
    });
});

/* CLEAR */
socket.on("clear", () => {
    document.getElementById("messages").innerHTML = "";
});
</script>

</body>
</html>
